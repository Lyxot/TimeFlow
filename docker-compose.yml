services:
  postgres:
    image: postgres:18
    container_name: timeflow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./db:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    image: lyxot/timeflow-server:latest
    container_name: timeflow-server
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      TIMEFLOW_POSTGRES_HOST: postgres
      TIMEFLOW_POSTGRES_PORT: 5432
      TIMEFLOW_POSTGRES_DATABASE: ${POSTGRES_DB}
      TIMEFLOW_POSTGRES_USER: ${POSTGRES_USER}
      TIMEFLOW_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TIMEFLOW_JWT_PUBLIC_KEY_PATH: /jwt-public.pem
      TIMEFLOW_JWT_PRIVATE_KEY_PATH: /jwt-private.pem
    volumes:
      - ./server.yml:/server.yml
      - ./jwt-public.pem:/jwt-public.pem:ro
      - ./jwt-private.pem:/jwt-private.pem:ro
