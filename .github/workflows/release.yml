name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/build.yml
    secrets: inherit

  wait-build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Wait for build workflow
    permissions:
      actions: read
      contents: read
    outputs:
      run_id: ${{ steps.wait.outputs.run_id }}
    steps:
      - name: Wait for build.yml run on this commit
        id: wait
        uses: actions/github-script@v7
        with:
          script: |
            const workflow_id = "build.yml";
            const sha = context.sha;
            const { owner, repo } = context.repo;
            const waitMs = 15000;
            const timeoutMs = 60 * 60 * 1000; // 60 minutes
            const start = Date.now();
            core.info(`Waiting for workflow '${workflow_id}' on sha ${sha}`);
            while (true) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id,
                event: "push",
                per_page: 20,
              });
              const run = runs.data.workflow_runs.find(r => r.head_sha === sha);
              if (run && run.status === "completed") {
                if (run.conclusion !== "success") {
                  core.setFailed(`build.yml run ${run.id} finished with conclusion ${run.conclusion}`);
                }
                core.info(`Found completed run id: ${run.id}`);
                core.setOutput("run_id", run.id.toString());
                return;
              }
              if (Date.now() - start > timeoutMs) {
                core.setFailed("Timed out waiting for build.yml run to complete");
              }
              core.info("Not completed yet, sleep...");
              await new Promise(r => setTimeout(r, waitMs));
            }

  release:
    needs: [build, wait-build]
    if: |
      (github.event_name == 'workflow_dispatch' && needs.build.result == 'success') ||
      (github.event_name == 'push' && needs.wait-build.result == 'success')
    runs-on: ubuntu-latest
    name: Create release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: 'recursive'

      - name: Get tags
        id: tags
        run: |
          # Get the latest tag (current tag being released)
          NEW_TAG=$(git describe --tags --abbrev=0)
          NEW_TAG_CLEAN=${NEW_TAG#v}
          echo "new_tag=$NEW_TAG_CLEAN" >> $GITHUB_OUTPUT
          echo "New tag: $NEW_TAG_CLEAN"
          
          # Get the latest release tag (previous release)
          LATEST_RELEASE_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 2 | tail -n 1)
          if [ -z "$LATEST_RELEASE_TAG" ]; then
            # If no previous release, use the first commit
            LATEST_RELEASE_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          LATEST_TAG_CLEAN=${LATEST_RELEASE_TAG#v}
          echo "latest_tag=$LATEST_TAG_CLEAN" >> $GITHUB_OUTPUT
          echo "Latest release tag: $LATEST_TAG_CLEAN"

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true
          run-id: ${{ github.event_name == 'push' && needs.wait-build.outputs.run_id || github.run_id }}

      - name: Prepare release notes
        env:
          NEW_TAG: ${{ steps.tags.outputs.new_tag }}
          LATEST_TAG: ${{ steps.tags.outputs.latest_tag }}
        run: |
          # Extract changelog section for new tag
          CHANGELOG_SECTION=""
          IN_SECTION=0
          while IFS= read -r line; do
            if [[ "$line" =~ ^##[[:space:]]+v?${NEW_TAG}[[:space:]]*$ ]] || [[ "$line" =~ ^##[[:space:]]+\[v?${NEW_TAG}\] ]]; then
              IN_SECTION=1
              continue
            elif [[ "$line" =~ ^##[[:space:]] ]] && [[ $IN_SECTION -eq 1 ]]; then
              break
            elif [[ $IN_SECTION -eq 1 ]]; then
              CHANGELOG_SECTION="${CHANGELOG_SECTION}${line}"$'\n'
            fi
          done < CHANGELOG.md
          
          # If no changelog section found, use a default message
          if [ -z "$CHANGELOG_SECTION" ]; then
            CHANGELOG_SECTION="## What's Changed"$'\n\n'"See the full changelog for details."$'\n'
          fi
          
          # Add full changelog link
          FULL_CHANGELOG="Full Changelog: [v${LATEST_TAG}...v${NEW_TAG}](https://github.com/Lyxot/TimeFlow/compare/v${LATEST_TAG}...v${NEW_TAG})"
          
          # Process RELEASE_NOTES.md and replace __VERSION__
          RELEASE_NOTES=$(sed "s/__VERSION__/${NEW_TAG}/g" RELEASE_NOTES.md)
          
          # Combine everything
          {
            echo "$CHANGELOG_SECTION"
            echo ""
            echo "$FULL_CHANGELOG"
            echo ""
            echo "$RELEASE_NOTES"
          } > release_notes.md
          
          echo "=== Generated Release Notes ==="
          cat release_notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.tags.outputs.new_tag }}
          tag_name: v${{ steps.tags.outputs.new_tag }}
          body_path: release_notes.md
          files: artifacts/*
          draft: false
          prerelease: false

