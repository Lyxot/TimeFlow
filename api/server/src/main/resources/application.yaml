ktor:
  application:
    modules:
      - xyz.hyli.timeflow.ApplicationKt.module
  deployment:
    port: 8080
jwt:
  domain: "https://jwt-provider-domain/"
  audience: "jwt-audience"
  realm: "ktor sample app"
  issuer: "jwt-issuer"
  # Generate keys with:
  # openssl genpkey -algorithm RSA -out jwt-private.pem -pkeyopt rsa_keygen_bits:4096
  # openssl rsa -pubout -in jwt-private.pem -out jwt-public.pem
  privateKeyPath: "jwt-private.pem"
  publicKeyPath: "jwt-public.pem"
postgres:
  url: "jdbc:postgresql://localhost/default"
  user: username
  password: password
email:
  verificationEnabled: true
  host: "smtp.example.com"
  port: "465"
  username: "your-email@example.com"
  password: "your-password"
  from: "noreply@example.com"
  ssl: true
  codeExpirationMinutes: 10