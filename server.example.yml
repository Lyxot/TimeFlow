ktor:
  deployment:
    port: 8080
jwt:
  domain: "http://localhost:8080"
  audience: "timeflow-client"
  realm: "TimeFlow API"
  issuer: "timeflow-api"
  # Generate keys with:
  # openssl genpkey -algorithm RSA -out jwt-private.pem -pkeyopt rsa_keygen_bits:4096
  # openssl rsa -pubout -in jwt-private.pem -out jwt-public.pem
  privateKeyPath: "jwt-private.pem"
  publicKeyPath: "jwt-public.pem"
postgres:
  host: "localhost"
  port: "5432"
  database: "timeflow"
  user: username
  password: password
  maximumPoolSize: 3
email:
  verificationEnabled: true
  host: "smtp.example.com"
  port: "465"
  username: "your-email@example.com"
  password: "your-password"
  from: "noreply@example.com"
  ssl: true
  codeExpirationMinutes: 10
webApp:
  serveEnabled: true
  # Leave empty to use the bundled zip in the bundled-web server build.
  # Set a filesystem path here when running the plain server build with an external web app zip.
  zipPath: ""
turnstile:
  enabled: false
  secretKey: ""
  siteVerifyUrl: "https://challenges.cloudflare.com/turnstile/v0/siteverify"
